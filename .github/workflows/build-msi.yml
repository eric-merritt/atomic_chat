name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload signed assets to'
        required: true
        default: 'v1.0.0'

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller and deps
        run: pip install pyinstaller websockets rich requests python-dotenv cryptography

      - name: Build setup wizard exe
        run: >-
          pyinstaller
          --onefile
          --console
          --name atomic-chat-setup
          installer\atomic_chat_installer.py

      - name: Build cloud agent exe
        run: >-
          pyinstaller
          --onefile
          --console
          --name atomic-chat-agent
          --hidden-import websockets.sync.client
          --collect-all cryptography
          atomic_client\agent.py

      - name: Install WiX 4
        run: dotnet tool install --global wix --version "4.*"

      - name: Build MSI
        run: wix build installer\atomic-chat.wxs -o installer\atomic-chat-setup.msi

      - name: Upload setup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atomic-chat-windows
          path: |
            dist\atomic-chat-setup.exe
            installer\atomic-chat-setup.msi

      - name: Prepare MSIX layout
        run: |
          New-Item -ItemType Directory -Force msix_layout\Assets | Out-Null
          Copy-Item dist\atomic-chat-agent.exe msix_layout\
          Copy-Item installer\AppxManifest.xml msix_layout\

      - name: Generate placeholder assets
        shell: python
        run: |
          import struct, zlib
          def make_png(w, h):
              def chunk(t, d):
                  c = zlib.crc32(t + d) & 0xffffffff
                  return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              raw = b''.join(b'\x00' + bytes([0, 120, 215]) * w for _ in range(h))
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          for name, size in [('Square44x44Logo.png', 44), ('Square150x150Logo.png', 150), ('StoreLogo.png', 50)]:
              open(f'msix_layout/Assets/{name}', 'wb').write(make_png(size, size))

      - name: Build MSIX
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter makeappx.exe |
                      Where-Object { $_.FullName -match 'x64' } | Sort-Object | Select-Object -Last 1 -ExpandProperty FullName
          & $makeappx pack /d msix_layout /p installer\atomic-chat-agent.msix /nv

      - name: Create self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Subject "CN=25F7CEF2-A1D9-49D0-A2BC-96F2F9BAC2A5" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -Type CodeSigningCert `
            -HashAlgorithm SHA256
          $pwd = ConvertTo-SecureString -String "TempSign!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath signing.pfx -Password $pwd
          Export-Certificate -Cert $cert -FilePath installer\atomic-chat-agent.cer -Type CERT

      - name: Sign MSIX
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } | Sort-Object | Select-Object -Last 1 -ExpandProperty FullName
          & $signtool sign /fd SHA256 /f signing.pfx /p "TempSign!" installer\atomic-chat-agent.msix

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: atomic-chat-agent-msix
          path: |
            installer\atomic-chat-agent.msix
            installer\atomic-chat-agent.cer

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            dist/atomic-chat-setup.exe
            installer/atomic-chat-setup.msi
            installer/atomic-chat-agent.msix
            installer/atomic-chat-agent.cer
