# Agentic chat reverse proxy
# Host: agent.eric-merritt.com

upstream chat_app {
    server 127.0.0.1:5000;
}

upstream filesystem_agent {
    server 127.0.0.1:8101;
}

upstream codesearch_agent {
    server 127.0.0.1:8102;
}

upstream web_agent {
    server 127.0.0.1:8103;
}

upstream marketplace_agent {
    server 127.0.0.1:8104;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name agent.eric-merritt.com;

    location / {
        return 301 https://agent.eric-merritt.com$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name agent.eric-merritt.com;

    ssl_certificate /etc/letsencrypt/live/eric-merritt.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eric-merritt.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check
    location /health {
        return 200 '{"status":"ok","agents":["filesystem","codesearch","web","marketplace"]}';
        add_header Content-Type application/json;
    }

    # Shared proxy settings
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_cache off;

    # Chat app (Flask on port 5000) — the main UI and API
    location / {
        proxy_pass http://chat_app;
    }

    # Streaming responses need longer timeout
    location /api/chat/stream {
        proxy_pass http://chat_app;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Direct subagent access (tool servers, no LLM)
    location /agents/filesystem/ {
        proxy_pass http://filesystem_agent/;
    }

    location /agents/codesearch/ {
        proxy_pass http://codesearch_agent/;
    }

    location /agents/web/ {
        proxy_pass http://web_agent/;
    }

    location /agents/marketplace/ {
        proxy_pass http://marketplace_agent/;
    }
}
